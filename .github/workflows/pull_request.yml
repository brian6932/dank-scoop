name: Pull Requests

on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write

jobs:
  pullRequestHandler:
    name: PullRequestHandler
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main
      - name: PullRequestHandler
        uses: ScoopInstaller/GithubActions@main
        env:
          SCOOP_REPO: 'https://github.com/brian6932/Scoop'
          SCOOP_BRANCH: '64bit-v2-v3-v4'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
